# pg_enhanced_query_logging.conf
#
# Sample configuration for testing.  Copy these settings into
# postgresql.conf or include this file with:
#   include = '/path/to/pg_enhanced_query_logging.conf'
#
# The extension must be loaded via shared_preload_libraries first:
#   shared_preload_libraries = 'pg_enhanced_query_logging'

# Master switch
peql.enabled = on

# Log queries taking longer than 100ms (-1 disables, 0 logs all)
peql.log_min_duration = 100

# Log file location (empty = use PostgreSQL's log_directory)
peql.log_directory = ''
peql.log_filename = 'peql-slow.log'

# Output detail: minimal, standard, full
peql.log_verbosity = 'standard'

# Log DDL/utility statements
peql.log_utility = off

# Log nested statements (inside functions/procedures)
peql.log_nested = off

# Rate limiting (1 = log all eligible queries)
peql.rate_limit = 1
peql.rate_limit_type = 'query'
peql.rate_limit_always_log_duration = 10000

# Adaptive rate limiting (0 = disabled for each limit)
peql.rate_limit_auto_max_queries = 0
peql.rate_limit_auto_max_bytes = 0

# Extended tracking
peql.track_io_timing = on
peql.track_wal = on
peql.track_memory = off
peql.track_planning = off
peql.track_wait_events = off

# Transaction-aware logging
peql.log_transaction = off

# Query plan and parameter logging
peql.log_parameter_values = off
peql.log_query_plan = off
peql.log_query_plan_format = 'text'
